{% extends 'APP/base.html' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6 col-lg-4">
        <div class="card shadow-sm">
            <div class="card-body">
                <h3 class="card-title text-center mb-4">Login</h3>
                
                <form method="post">
                    {% csrf_token %}

                    <div class="mb-3">
                        <label for="id_username" class="form-label">Usuário</label>
                        <input type="text" name="username" class="form-control" id="id_username" required>
                    </div>
                    <div class="mb-3">
                        <label for="id_password" class="form-label">Senha</label>
                        <input type="password" name="password" class="form-control" id="id_password" required>
                    </div>
                    {% if form.errors %}
                        <div class="alert alert-danger">
                            Usuário ou senha inválidos. Por favor, tente novamente.
                        </div>
                    {% endif %}
                    <div class="d-grid">
                        <button type="submit" class="btn btn-primary">Entrar</button>
                    </div>
                </form>
            </div>

            <div class="card-footer text-center bg-light">
                <small class="text-muted">Quem ainda não possui o Login, solicitar à Sabrina:</small>
                <div class="mt-2">
                    <a href="https://wa.me/5521996800387" target="_blank" rel="noopener noreferrer" class="btn btn-success btn-sm">
                        <i class="bi bi-whatsapp me-1"></i>
                        Iniciar conversa no WhatsApp
                    </a>
                </div>
            </div>
            </div>
    </div>
</div>
{% endblock %}
